<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran</title>
</head>
<body>
    <form action="#" method="POST">
    <fieldset>
        <legend>Data Diri</legend>
        
        <label for="nama">Nama Lengkap:</label>
        <input type="text" id="nama" name="nama" placeholder="Masukkan nama" required>
        <br>
        <label for="NIS">NIS:</label>
        <input type="text" id="NIS" name="NIS" placeholder="Masukan NIS" required>
        
        <br>
        <label for="asal">Tempat Lahir:</label>
        <input type="text" id="asal" name="NIS" placeholder="Masukan Tempat Lahir" required>
        
        <br>
        <label for="lahir">Tanggal Lahir:</label>
        <input type="date" id="lahir" name="lahir">
        <br>
        <label for="jk">Jenis Kelamin:</label>
        <select id="jk" name="jk">
            <option value="laki">Laki-laki</option>
            <option value="perempuan">Perempuan</option>
        </select>

    </fieldset>

    <fieldset>
        <legend>Kontak</legend>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="email@example.com" required>
        <br>

        <label for="no">Nomor Telepon</label>
        <input type="text" id="no" name="no" placeholder="Masukkan omor Telepon" required>
        <br>

        <label for="alamat">Alamat:</label>
        <textarea name="alamat" id="alamat"></textarea>
        <!-- <input type="text" id="NIS" name="NIS" placeholder="Masukan NIS" required> -->
        
    </fieldset>

    <fieldset>
        <legend>Pilihan</legend>

        <label for="jr">Jurusan:</label>
        <select id="jr" name="jr">
            <option value="">Pilih</option>
            <option value="laki">IPA</option>
            <option value="perempuan">IPS</option>
        </select>
        <br><br>
        <label>Ekstrakulikuler:</label>
        <br>
        <input type="checkbox" id="pramuka" name="ekstrakulikuler" value="pramuka">
        <label for="pramuka">Pramuka</label>
        <input type="checkbox" id="English Club" name="ekstrakulikuler" value="English Club">
        <label for="English Club">English Club</label><br>
        <input type="checkbox" id="Tapak Suci" name="ekstrakulikuler" value="Tapak Suci">
        <label for="Tapak Suci">Tapak Suci</label>
        <input type="checkbox" id="basket" name="ekstrakulikuler" value="basket">
        <label for="basket">Basket Ball</label><br>
        <input type="checkbox" id="alam" name="ekstrakulikuler" value="alam">
        <label for="alam">Pecinta Alam</label>
        <input type="checkbox" id="seni" name="ekstrakulikuler" value="seni">
        <label for="seni">Seni</label><br>
        
    </fieldset>

    <fieldset>
        <legend>Unggah Foto</legend>
        <label for="foto">Unggah Foto:</label>
        <input type="file" id="foto" name="email" placeholder="foto 3x4" required>
        <br>
    </fieldset>

    <button type="submit">Daftar</button>
    <button type="reset">Reset</button>
</form>
</body>
</html>
